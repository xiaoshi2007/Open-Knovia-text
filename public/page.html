<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>页面</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        line-height: 1.6;
        color: #1a1a1a;
        background: #f5f5f7;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      main {
        max-width: 36rem;
        background: #fff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        font-weight: 600;
      }
      p {
        margin: 0;
        color: #444;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>静态页面</h1>
      <p>开发服务器运行时可在浏览器访问：<code>/page.html</code>。也可直接用浏览器打开本文件。</p>
    </main>
  </body>
</html>
